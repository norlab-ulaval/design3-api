<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design3 API - Manage Scores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        button { touch-action: manipulation; }
        .score-btn {
            transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
        }
        .score-btn:active {
            transform: scale(0.92);
            filter: brightness(1.05);
        }
        .score-btn.flash {
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.35);
        }
    </style>
</head>
<body class="text-gray-800 antialiased p-6">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h1 class="text-3xl font-bold mb-4 text-center text-blue-600">Scores Dashboard</h1>
            <p class="text-gray-600 mb-8 text-center">
                Enter the password to access the scores. Use the <strong>+</strong> and <strong>-</strong> buttons to update team scores in real time without refreshing.
            </p>
            
            <div id="password-container" class="mb-8 max-w-sm mx-auto">
                <div class="flex items-center border-b border-blue-500 py-2">
                    <input class="appearance-none bg-transparent border-none w-full text-gray-700 mr-3 py-1 px-2 leading-tight focus:outline-none" type="password" id="password" placeholder="Dashboard Password">
                    <button class="flex-shrink-0 bg-blue-500 hover:bg-blue-700 border-blue-500 hover:border-blue-700 text-sm border-4 text-white py-1 px-2 rounded" type="button" onclick="passwordSubmitted()">
                        Submit
                    </button>
                </div>
            </div>

            <div id="scores-container" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div>
                        <h2 class="text-2xl font-bold mb-4 border-b pb-2 text-gray-700">Cranes</h2>
                        <div id="cranes-list" class="space-y-4">
                            <!-- JS Will Populate -->
                        </div>
                    </div>
                    
                    <div>
                        <h2 class="text-2xl font-bold mb-4 border-b pb-2 text-gray-700">Vehicles</h2>
                        <div id="vehicles-list" class="space-y-4">
                            <!-- JS Will Populate -->
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        const CRANES = {{ cranes | tojson }};
        const VEHICLES = {{ vehicles | tojson }};
        let eventSource = null;

        function createScoreRow(id, labelPrefix) {
            return `
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-lg border">
                    <span class="font-semibold text-lg w-1/3">${labelPrefix} ${String(id).padStart(2, '0')}</span>
                    <span id="score-${id}" class="text-2xl font-bold w-1/3 text-center">0</span>
                    <div class="flex space-x-2 w-1/3 justify-end">
                        <button onclick="handleScoreClick(this, () => decrementTeamScore(${id}))" class="score-btn bg-red-500 hover:bg-red-600 text-white font-bold h-14 w-14 text-xl rounded-full flex items-center justify-center transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-opacity-50">
                            -
                        </button>
                        <button onclick="handleScoreClick(this, () => incrementTeamScore(${id}))" class="score-btn bg-green-500 hover:bg-green-600 text-white font-bold h-14 w-14 text-xl rounded-full flex items-center justify-center transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-opacity-50">
                            +
                        </button>
                    </div>
                </div>
            `;
        }

        function initUI() {
            const cranesList = document.getElementById("cranes-list");
            const vehiclesList = document.getElementById("vehicles-list");
            
            CRANES.forEach(id => {
                cranesList.innerHTML += createScoreRow(id, "Équipe");
            });
            
            VEHICLES.forEach(id => {
                vehiclesList.innerHTML += createScoreRow(id, "Équipe");
            });
        }

        async function hide_scores_if_not_authorized() {
            const authorized = await isAuthorized();
            if (!authorized) {
                document.getElementById("scores-container").classList.add("hidden");
                document.getElementById("password-container").classList.remove("hidden");
                if (eventSource) {
                    eventSource.close();
                }
            } else {
                document.getElementById("scores-container").classList.remove("hidden");
                document.getElementById("password-container").classList.add("hidden");
                startSSE();
            }
        }

        async function passwordSubmitted() {
            const password = document.getElementById("password").value;
            localStorage.setItem("password", password);
            const authorized = await isAuthorized();
            if (authorized) {
                document.getElementById("scores-container").classList.remove("hidden");
                document.getElementById("password-container").classList.add("hidden");
                startSSE();
            } else {
                alert("Wrong password");
            }
        }

        function isAuthorized() {
            const password = localStorage.getItem("password");
            if (!password) return Promise.resolve(false);
            
            return fetch("/is_authorized", {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": password,
                },
            }).then(res => res.status === 200).catch(() => false);
        }

        function updateScoreAnimate(element, newScore) {
            if (element.innerText !== String(newScore)) {
                element.innerText = newScore;
            }
        }

        function handleScoreClick(button, action) {
            button.classList.add("flash");
            setTimeout(() => button.classList.remove("flash"), 180);
            action();
        }

        function startSSE() {
            if (eventSource) {
                eventSource.close();
            }
            const password = localStorage.getItem("password");
            eventSource = new EventSource(`/scores/stream?password=${encodeURIComponent(password)}`);
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                data.crane_scores.forEach(crane => {
                    const el = document.getElementById("score-" + crane.id);
                    if (el) updateScoreAnimate(el, crane.points);
                });
                data.vehicle_scores.forEach(vehicle => {
                    const el = document.getElementById("score-" + vehicle.id);
                    if (el) updateScoreAnimate(el, vehicle.points);
                });
            };

            eventSource.onerror = function() {
                console.error("SSE connection lost or error. Reconnecting...");
            };
        }

        function decrementTeamScore(team_id) {
            const password = localStorage.getItem("password");
            fetch(`/scores/decrement/${team_id}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": password,
                },
            }).catch(console.error);
        }

        function incrementTeamScore(team_id) {
            const password = localStorage.getItem("password");
            fetch(`/scores/increment/${team_id}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": password,
                },
            }).catch(console.error);
        }

        window.onload = () => {
            initUI();
            hide_scores_if_not_authorized();
        };
    </script>
</body>
</html>
