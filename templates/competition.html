<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Competition View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        background-color: #000;
      }
      #competition-frame {
        display: block;
        width: 100vw;
        height: 100vh;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <img
      id="competition-frame"
      src="/competition/image"
      alt="Competition render"
    />

    <script>
      const frame = document.getElementById("competition-frame");

      function refreshFrame() {
        const cacheBuster = Date.now();
        frame.src = `/competition/image?t=${cacheBuster}`;
      }

      window.onload = () => {
        refreshFrame();
        setInterval(refreshFrame, 3000);
      };
    </script>
  </body>
</html>
