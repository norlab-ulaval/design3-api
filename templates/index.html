<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design 3 API - Overview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background-color: #f3f4f6; }
    </style>
  </head>
  <body class="text-gray-800 antialiased p-6">
    <div class="max-w-6xl mx-auto">
      
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold text-blue-600">Design 3 API Overview</h1>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-green-500">
          <h2 class="text-2xl font-bold text-gray-700 mb-4 border-b pb-2">Vehicles Information</h2>
          <div class="overflow-x-auto">
            <table class="min-w-full text-left">
              <thead>
                <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                  <th class="py-3 px-6">ID</th>
                  <th class="py-3 px-6">Path</th>
                </tr>
              </thead>
              <tbody class="text-gray-600 text-sm font-light">
                {% for vehicle in vehicles %}
                <tr class="border-b border-gray-200 hover:bg-gray-50">
                  <td class="py-3 px-6 text-left whitespace-nowrap font-medium text-green-600">ZD{{ vehicle.id }}</td>
                  <td class="py-3 px-6 text-left">{{ vehicle.path }}</td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-purple-500">
          <h2 class="text-2xl font-bold text-gray-700 mb-4 border-b pb-2">Cranes Information</h2>
          <div class="overflow-x-auto">
            <table class="min-w-full text-left">
              <thead>
                <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                  <th class="py-3 px-6">ID</th>
                  <th class="py-3 px-6">Tokens</th>
                </tr>
              </thead>
              <tbody class="text-gray-600 text-sm font-light">
                {% for crane in cranes %}
                <tr class="border-b border-gray-200 hover:bg-gray-50">
                  <td class="py-3 px-6 text-left whitespace-nowrap font-medium text-purple-600">ZC{{ crane.id }}</td>
                  <td class="py-3 px-6 text-left">{{ crane.nb_tokens }}</td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-md">
        <h2 class="text-2xl font-bold text-red-700 mb-4">Admin Zone</h2>
        
        <div id="admin-login-container" class="flex flex-col sm:flex-row items-start sm:items-end space-y-4 sm:space-y-0 sm:space-x-4">
          <div>
            <label for="admin-password" class="block text-sm font-medium text-gray-700 mb-1">Admin Password</label>
            <input
              type="password"
              id="admin-password"
              class="border-gray-300 border rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-red-500 focus:border-red-500"
              placeholder="Enter password to unlock"
            />
          </div>
          <div>
            <button onclick="unlockAdmin()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded shadow transition">
              Unlock
            </button>
          </div>
        </div>

        <div id="admin-dashboard" class="hidden">
          <p class="text-green-700 font-semibold mb-4">Admin privileges unlocked.</p>
          <div class="flex flex-wrap gap-4">
            <button onclick="resetApi()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded shadow transition">
              Reset API
            </button>
            <a href="/input_scores" class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded shadow transition text-center">
              Input Scores
            </a>
            <button onclick="lockAdmin()" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded shadow transition">
              Lock
            </button>
          </div>
        </div>
      </div>

    </div>

    <script>
      async function isAuthorized(pwd) {
        if (!pwd) return false;
        try {
          const response = await fetch("/is_authorized", {
            headers: { Authorization: pwd }
          });
          return response.status === 200;
        } catch (e) {
          return false;
        }
      }

      async function checkAuth() {
        const password = localStorage.getItem("password");
        const authorized = await isAuthorized(password);
        if (authorized) {
          showDashboard();
        } else {
          showLogin();
        }
      }

      function showLogin() {
        document.getElementById("admin-login-container").classList.remove("hidden");
        document.getElementById("admin-dashboard").classList.add("hidden");
      }

      function showDashboard() {
        document.getElementById("admin-login-container").classList.add("hidden");
        document.getElementById("admin-dashboard").classList.remove("hidden");
      }

      async function unlockAdmin() {
        const pwdInput = document.getElementById("admin-password").value;
        const authorized = await isAuthorized(pwdInput);

        if (authorized) {
          localStorage.setItem("password", pwdInput);
          showDashboard();
          document.getElementById("admin-password").value = "";
        } else {
          alert("Incorrect password");
          localStorage.removeItem("password");
        }
      }

      function lockAdmin() {
        localStorage.removeItem("password");
        showLogin();
      }

      function resetApi() {
        const password = localStorage.getItem("password");
        fetch("/reset", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: password,
          },
        })
          .then((response) => {
            if (response.status === 401) {
              throw new Error("Incorrect password");
            }
            return response.json();
          })
          .then((data) => {
            alert(data.message);
            window.location.reload();
          })
          .catch((error) => {
            alert(error.message);
          });
      }

      window.onload = checkAuth;
    </script>
  </body>
</html>
